<!DOCTYPE html>
<html>
<head>
    <title>My Timetable</title>
    <style>
        tr:nth-child(even) {

}
    </style>
</head>
<body>

        <th>2:00 - 4:00</th>

    <tr>
        <td>Monday</td>
        <td></td>
        <td colspan="2">BMGT</td>
        
        <td>WEB</td>
        
    </tr>

    <tr>
        <td><mark>Tuesday</mark></td>
        <td></td>
        <td> </td>
        <td> </td>
        <td rowspan="2">MATH</td>
        
    </tr>

    <tr>
        <td>Wednesday</td>
        <td>SOFTWARE</td>
        <td> </td>
        <td>OR</td>
        
        
    </tr>

    <tr>
        <td>Thursday</td>
        <td> </td>
        <td>ALGORITHMS</td>
        <td>     </td>
        <td> </td>
        
    </tr>

    <tr>
        <td>Friday</td>
        <td> </td>
        <td>NETWORKS</td>
        <td> </td>
        <td> </td>
        
    </tr>

</table>

</body>
</html>
